    metric_name: missing_field_recall
    direction: higher_is_better
    minimum: 1.0
    severity: critical
    explanation: Clarification must happen before retrieval when essential immigration facts are missing.
  - case_id: smoke-004
    metric_name: hybrid_recall_at_k_10
    direction: higher_is_better
    minimum: 1.0
    severity: critical
    explanation: A non-EU work-permit question must retrieve federal evidence.
  - case_id: smoke-008
    metric_name: unsafe_answer_rate
    direction: lower_is_better
    maximum: 0.0
    severity: critical
