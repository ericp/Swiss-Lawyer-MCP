services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_GENERATION_MODEL: ${OPENAI_GENERATION_MODEL:-gpt-4o-mini}
      OPENAI_PLANNER_MODEL: ${OPENAI_PLANNER_MODEL:-gpt-4o-mini}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      SQLITE_DATABASE_URL: ${SQLITE_DATABASE_URL:-sqlite:///data/sqlite/memory.db}
      CHROMA_PATH: ${CHROMA_PATH:-data/chromadb}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-swiss_procedures}
      PDF_ROOT: ${PDF_ROOT:-data/pdfs}
      SYNC_DOCUMENT_PATH: ${SYNC_DOCUMENT_PATH:-data/documents}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-replace-with-a-long-random-value}
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    networks:
      - swiss-lawyer-local
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MCP_SERVER_NAME: ${MCP_SERVER_NAME:-Swiss Lawyer}
      MCP_SERVER_VERSION: ${MCP_SERVER_VERSION:-1.0.0}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8001
      MCP_PATH: /mcp
      MCP_AUTH_MODE: single_user
      MCP_SINGLE_USER_KEY: ${MCP_SINGLE_USER_KEY:-replace-with-a-private-local-key}
      MCP_PUBLIC_BASE_URL: ${MCP_PUBLIC_BASE_URL:-}
      SWISS_LAWYER_API_BASE_URL: http://api:8000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-replace-with-a-long-random-value}
      MCP_BACKEND_TIMEOUT_SECONDS: ${MCP_BACKEND_TIMEOUT_SECONDS:-90}
      MCP_MAX_QUESTION_LENGTH: ${MCP_MAX_QUESTION_LENGTH:-10000}
      MCP_MAX_PROFILE_FIELDS: ${MCP_MAX_PROFILE_FIELDS:-50}
      MCP_MAX_PROGRESS_NOTE_LENGTH: ${MCP_MAX_PROGRESS_NOTE_LENGTH:-5000}
      MCP_RATE_LIMIT_REQUESTS_PER_MINUTE: ${MCP_RATE_LIMIT_REQUESTS_PER_MINUTE:-30}
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - swiss-lawyer-local
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

networks:
  swiss-lawyer-local:
    driver: bridge
